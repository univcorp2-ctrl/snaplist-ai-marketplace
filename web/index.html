<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111827"><meta name="description" content="写真1枚から相場と出品文を生成するAIクロスリスティングPWA"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon.svg" type="image/svg+xml"><link rel="stylesheet" href="styles.css"><title>SnapList AI</title></head><body><header class="topbar"><a class="brand" href="#"><span class="logo">S</span><span>SnapList AI</span></a><span class="badge">OPEN SOURCE MVP</span></header><main><section class="hero"><div><p class="eyebrow">PHOTO → PRICE → LISTING</p><h1>撮るだけで、<br><span>売れる出品案</span>まで。</h1><p>商品の写真から情報を整理し、相場・推奨価格・説明文を生成。複数プラットフォーム向けの下書きを一括で作成します。</p></div><div class="hero-stat"><strong>60秒</strong><span>出品案の作成目安</span></div></section><section class="workspace"><div class="panel upload-panel"><div class="panel-head"><div><span class="step">1</span><h2>写真を追加</h2></div><button id="settingsBtn" class="ghost">API設定</button></div><label class="dropzone"><input id="photoInput" type="file" accept="image/*" capture="environment"><img id="preview" alt="商品写真プレビュー" hidden><div id="emptyState"><div class="camera">◎</div><strong>カメラで撮影 / 写真を選択</strong><span>正面・背面・型番・傷の写真があると精度が上がります</span></div></label><div class="fields two"><label>商品ヒント<input id="productHint" placeholder="例: SEIKO ダイバーズウォッチ"></label><label>状態<select id="condition"><option>新品、未使用</option><option>未使用に近い</option><option selected>目立った傷や汚れなし</option><option>やや傷や汚れあり</option><option>傷や汚れあり</option></select></label></div><button id="analyzeBtn" class="primary" disabled><span>AIで商品を解析する</span><span>→</span></button></div><div class="panel result-panel"><div class="panel-head"><div><span class="step">2</span><h2>出品内容を確認</h2></div><span id="status" class="status">写真を追加してください</span></div><div id="resultEmpty" class="result-empty"><div>✦</div><p>解析結果と相場がここに表示されます</p></div><div id="result" hidden><div class="price-grid"><div><span>相場レンジ</span><strong id="rangePrice">—</strong></div><div class="recommended"><span>おすすめ価格</span><strong id="recommendedPrice">—</strong></div><div><span>早く売る</span><strong id="quickPrice">—</strong></div></div><div class="fields"><label>タイトル<input id="title"></label><label>商品説明<textarea id="description" rows="8"></textarea></label></div><div class="meta-grid"><label>ブランド<input id="brand"></label><label>カテゴリ<input id="category"></label><label>状態<input id="resultCondition"></label></div><h3>参考相場</h3><div id="samples" class="samples"></div><h3>出品先</h3><div class="platforms"><label><input type="checkbox" value="own-store" checked><span>自社ストア<small>自動</small></span></label><label><input type="checkbox" value="ebay"><span>eBay<small>公式API</small></span></label><label><input type="checkbox" value="yahoo-shopping"><span>Yahoo!ショッピング<small>公式API</small></span></label><label><input type="checkbox" value="mercari" checked><span>メルカリ<small>下書き</small></span></label><label><input type="checkbox" value="rakuma"><span>ラクマ<small>下書き</small></span></label><label><input type="checkbox" value="yahoo-auction"><span>Yahoo!オークション<small>下書き</small></span></label></div><div class="actions"><button id="exportBtn" class="secondary">JSON/CSVを書き出す</button><button id="publishBtn" class="primary">選択先へ出品準備</button></div><div id="publishResults" class="publish-results"></div></div></div></section></main><dialog id="settingsDialog"><form method="dialog"><h2>API設定</h2><label>FastAPI URL<input id="apiBase" placeholder="http://localhost:8000"></label><p>未設定または接続できない場合はブラウザ内デモ解析へ切り替わります。</p><div class="actions"><button value="cancel" class="secondary">閉じる</button><button id="saveSettings" value="default" class="primary">保存</button></div></form></dialog><div id="toast" class="toast" hidden></div><script src="app.js" defer></script></body></html>
